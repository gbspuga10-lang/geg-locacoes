<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeG - Locações & Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-content { transition: all 0.2s ease; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        input:focus, select:focus { border-color: #f97316 !important; outline: none; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .item-badge { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 13px; border-left: 4px solid #f97316; }
        /* Estilo para a sublinha de endereço/contato */
        .sub-info { display: block; font-size: 10px; color: #64748b; font-weight: normal; margin-top: 2px; line-height: 1.2; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-slate-900 pb-10">

    <div id="loginOverlay">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <img src="logogg.jpeg" alt="GeG" class="h-20 mx-auto mb-6">
            <input type="password" id="inputSenha" placeholder="Senha de Acesso" class="w-full border-2 border-slate-200 p-3 rounded-lg mb-4 text-center">
            <button onclick="verificarSenha()" class="w-full bg-orange-500 text-white font-black py-4 rounded-lg uppercase shadow-lg hover:bg-orange-600">Entrar</button>
            <p id="erroSenha" class="text-red-500 text-xs mt-3 font-bold hidden">Senha incorreta!</p>
        </div>
    </div>

    <div id="conteudoSistema" style="display: none;">
        <nav class="bg-slate-800 text-white p-3 shadow-xl mb-4 border-b-4 border-orange-500 sticky top-0 z-50">
            <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <img src="logogg.jpeg" alt="GeG" class="h-12">
                <div class="flex flex-wrap justify-center gap-4 items-center text-[10px] md:text-xs font-black uppercase">
                    <button onclick="showTab('dashboard'); renderizarCharts();" class="text-orange-400 border border-orange-400 px-2 py-1 rounded">📊 Dashboard</button>
                    <button onclick="showTab('clientes')" class="hover:text-orange-400 transition">Clientes</button>
                    <button onclick="showTab('equipamentos')" class="hover:text-orange-400 transition">Materiais</button>
                    <button onclick="abrirRelatorio()" class="hover:text-orange-400 transition">Relatórios</button>
                    <button onclick="logout()" class="text-red-400 transition">Sair</button>
                    <button onclick="showTab('locacao')" class="bg-orange-500 px-4 py-2 rounded text-white transition">+ Locação</button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto p-2">
            
            <section id="relatorios" class="tab-content hidden">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                    <div class="bg-slate-700 p-3 rounded-lg border-l-4 border-orange-500 text-white"><p class="text-[8px] font-black uppercase">Receita Ativa</p><h3 id="dashTotal" class="text-sm md:text-2xl font-black">R$ 0,00</h3></div>
                    <div class="bg-white p-3 rounded-lg border-l-4 border-red-500 shadow-md"><p class="text-[8px] font-black uppercase text-red-600">Atrasos</p><h3 id="dashAtraso" class="text-sm md:text-2xl font-black text-red-600">0</h3></div>
                    <div class="bg-slate-700 p-2 rounded-lg flex items-center col-span-2"><input type="text" id="inputBusca" onkeyup="filtrarTabela()" placeholder="🔍 Buscar por cliente, item ou endereço..." class="w-full bg-slate-600 text-white rounded p-2 text-xs outline-none"></div>
                </div>

                <div class="bg-white rounded-lg shadow-xl overflow-hidden border border-slate-200">
                    <div class="table-container">
                        <table class="w-full text-left min-w-[1250px]">
                            <thead>
                                <tr class="bg-slate-100 text-slate-600 uppercase text-[10px] font-black border-b">
                                    <th class="p-4">Cliente / Contato</th>
                                    <th class="p-4">Material</th>
                                    <th class="p-4 text-center">Qtd</th>
                                    <th class="p-4 text-center">Início</th>
                                    <th class="p-4 text-center">Retorno</th>
                                    <th class="p-4">Valor Un.</th>
                                    <th class="p-4">Total</th>
                                    <th class="p-4 text-center">Pagamento</th>
                                    <th class="p-4 text-center">Status</th>
                                    <th class="p-4 text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaDados" class="text-xs font-medium"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // ... (SENHA, URL_SCRIPT, MASKS e LOGIN permanecem os mesmos) ...
        const SENHA_ACESSO = "Geg@0612";
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyLDvIJ7BeQ5tLDKU8adTf3jqzKdWCQLIMXqxvGbVGHUOkPyBhEzUat2hlNb6xAdNQJEw/exec";
        let chartInstance1 = null, chartInstance2 = null;
        let carrinhoLocacao = [];

        function verificarSenha() { if (document.getElementById('inputSenha').value === SENHA_ACESSO) { localStorage.setItem('geg_autenticado', 'true'); liberarSistema(); } else { document.getElementById('erroSenha').classList.remove('hidden'); } }
        window.onload = () => { if(localStorage.getItem('geg_autenticado') === 'true') liberarSistema(); };
        function liberarSistema() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('conteudoSistema').style.display = 'block'; carregarEquipamentos(); carregarClientes(); const anoSel = document.getElementById('filtroAno'); if(anoSel) { const anoAtual = new Date().getFullYear(); for(let i=0; i<3; i++) { let a = anoAtual - i; anoSel.innerHTML += `<option value="${a}">${a}</option>`; } } }
        function logout() { localStorage.removeItem('geg_autenticado'); location.reload(); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function mascaraMoeda(i) { let v = i.value.replace(/\D/g, ""); v = (v/100).toFixed(2).replace(".", ","); i.value = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1."); }

        // --- LÓGICA DO RELATÓRIO COM ENDEREÇO E TELEFONE ---
        async function abrirRelatorio() {
            showTab('relatorios');
            const tb = document.getElementById('tabelaDados');
            tb.innerHTML = "<tr><td colspan='10' class='p-10 text-center font-black text-slate-400 animate-pulse'>Carregando dados da GeG...</td></tr>";
            
            try {
                const r = await fetch(URL_SCRIPT + "?aba=Locacoes");
                const dados = await r.json();
                tb.innerHTML = ""; 
                let somaTotalAtiva = 0, atrasos = 0; 
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                
                dados.forEach(item => {
                    const l = item.valores; 
                    const numLinha = item.numeroLinha; 
                    if(!l[0] || l[0] === "Nome") return;
                    
                    const clienteNome = l[0];
                    const endereco = l[2] || "Endereço não informado";
                    const itemNome = l[3];
                    const valorUn = parseFloat(String(l[4]).replace(",", ".")) || 0;
                    const statusLoc = l[7] || "Ativo";    
                    const statusPagto = l[8] || "Pendente"; 
                    const qtd = parseFloat(l[9]) || 1; 
                    const totalLinha = valorUn * qtd;
                    
                    // Formatação de Datas
                    const parseData = (d) => {
                        let obj = new Date(d);
                        if(isNaN(obj.getTime())) { const p = String(d).split('/'); obj = new Date(p[2], p[1]-1, p[0]); }
                        return obj;
                    };
                    let dIni = parseData(l[5]);
                    let dFim = parseData(l[6]);
                    dFim.setHours(23,59,59,0); 

                    const isVencido = (statusLoc === "Ativo" && hoje > dFim);
                    if(statusLoc === "Ativo") { somaTotalAtiva += totalLinha; if(isVencido) atrasos++; }

                    // Montagem da Linha
                    tb.innerHTML += `<tr class="border-b hover:bg-slate-50 ${isVencido ? 'bg-red-50' : ''} transition">
                        <td class="p-4">
                            <div class="font-bold text-slate-800">${clienteNome}</div>
                            <div class="sub-info">
                                📍 ${endereco}<br>
                                🆔 ${l[1] || ''} </div>
                        </td>
                        <td class="p-4 text-slate-600 font-medium">${itemNome}</td>
                        <td class="p-4 text-center font-bold text-orange-600">${qtd}</td>
                        <td class="p-4 text-center text-[10px]">${dIni.toLocaleDateString('pt-BR')}</td>
                        <td class="p-4 text-center text-[10px]">${dFim.toLocaleDateString('pt-BR')}</td>
                        <td class="p-4 font-bold text-slate-500">R$ ${valorUn.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                        <td class="p-4 font-black text-slate-900 bg-slate-50/50">R$ ${totalLinha.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                        <td class="p-4 text-center">
                            <button onclick="mudarPagamento(${numLinha}, '${statusPagto}')" class="px-3 py-1 rounded text-[10px] font-black ${statusPagto === 'Pago' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-yellow-100 text-yellow-700 border border-yellow-200'} transition">
                                ${statusPagto}
                            </button>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded text-[9px] font-black uppercase ${statusLoc === 'Ativo' ? 'bg-slate-800 text-orange-400' : 'bg-gray-200 text-gray-500'}">
                                ${statusLoc}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            <div class="flex flex-row justify-center items-center gap-2">
                                ${statusLoc === 'Ativo' ? `<button onclick="finalizarLocacao(${numLinha})" class="bg-orange-500 text-white px-3 py-2 rounded font-black text-[9px] uppercase hover:bg-orange-600 shadow-sm transition">Finalizar</button>` : ''}
                                <button onclick="excluirLocacao(${numLinha})" class="bg-red-100 text-red-600 border border-red-200 px-3 py-2 rounded font-black text-[9px] uppercase hover:bg-red-600 hover:text-white transition">X</button>
                            </div>
                        </td>
                    </tr>`;
                });
                
                document.getElementById('dashTotal').innerText = `R$ ${somaTotalAtiva.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
                document.getElementById('dashAtraso').innerText = atrasos;
            } catch(e) { console.error(e); tb.innerHTML = "<tr><td colspan='10' class='p-10 text-center text-red-500'>Erro ao carregar dados. Verifique a conexão.</td></tr>"; }
        }

        // Funções de ação (Mantidas iguais ao anterior)
        async function mudarPagamento(linha, statusAtual) { const novo = statusAtual === 'Pago' ? 'Pendente' : 'Pago'; await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({tipo: 'pagamento', linha: linha, statusPagamento: novo}) }); setTimeout(abrirRelatorio, 500); }
        async function finalizarLocacao(linha) { if(!confirm("Deseja finalizar esta locação?")) return; await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({tipo: 'finalizar', linha: linha}) }); setTimeout(abrirRelatorio, 800); }
        async function excluirLocacao(linha) { if(!confirm("⚠️ EXCLUIR DEFINITIVAMENTE?")) return; await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({tipo: 'excluir', linha: linha}) }); setTimeout(abrirRelatorio, 800); }
        function filtrarTabela() { let f = document.getElementById("inputBusca").value.toUpperCase(); document.querySelectorAll("#tabelaDados tr").forEach(tr => { tr.style.display = tr.innerText.toUpperCase().includes(f) ? "" : "none"; }); }
    </script>
</body>
</html>
